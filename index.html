<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐱 Liz 日常全方位記錄 (雲端雙保險版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #f9fafb; padding: 15px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 400px; background: white; border-radius: 16px; border: 1px solid #f3f4f6; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .header { background: #fb923c; color: white; text-align: center; padding: 16px; font-weight: bold; font-size: 20px; }
        .profile-card { background: #fff7ed; margin: 12px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffedd5; }
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; background: #fed7aa; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .profile-name { font-size: 16px; font-weight: bold; color: #1f2937; }
        .tabs { display: flex; gap: 8px; padding: 0 12px; margin-bottom: 8px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; background: #f3f4f6; color: #4b5563; }
        .tab-btn.active-feed { background: #fb923c; color: white; }
        .tab-btn.active-poop { background: #78350f; color: white; }
        .form-section { padding: 0 12px 12px 12px; min-height: 100px; }
        .log-form { background: #f9fafb; padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
        .label-text { font-size: 10px; color: #9ca3af; display: block; margin-bottom: 2px; }
        .input-text { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; }
        .select-box { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; }
        .btn-submit { padding: 8px 16px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; min-width: 60px; text-align: center; }
        .btn-feed { background: #fb923c; }
        .btn-poop { background: #78350f; }
        .chart-section { padding: 12px; border-top: 1px solid #f3f4f6; background: #fdfdfd; }
        .chart-container { background: white; border: 1px solid #e5e7eb; padding: 10px; border-radius: 12px; position: relative; width: 100%; height: 180px; }
        .history-section { border-top: 1px solid #f3f4f6; padding: 12px; }
        .history-title { font-size: 12px; font-weight: bold; color: #9ca3af; margin-bottom: 8px; }
        .log-list { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 12px; border: 1px solid #f3f4f6; }
        .log-left { display: flex; align-items: center; gap: 8px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-feed { background: #fb923c; }
        .dot-poop { background: #78350f; }
        .log-title { font-size: 13px; font-weight: bold; color: #1f2937; }
        .log-time { font-size: 10px; color: #9ca3af; }
        .log-detail { font-size: 13px; font-weight: bold; }
        .text-feed { color: #f97316; }
        .text-poop { color: #78350f; }
        .btn-del { color: #d1d5db; border: none; background: none; font-size: 12px; cursor: pointer; padding: 4px; }
        .empty-text { text-align: center; font-size: 13px; color: #9ca3af; padding: 16px 0; }
        .cloud-status { text-align: center; font-size: 11px; color: #9ca3af; padding: 4px; background: #f3f4f6; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="cloud-status-bar" class="cloud-status">✨ 雙保險同步模式啟動</div>
        <div class="header">🐱 Liz 日常全方位記錄</div>
        <div class="profile-card">
            <div class="profile-info">
                <div class="avatar">🐱</div>
                <div>
                    <div class="profile-name">Liz</div>
                    <div class="profile-weight">共同守護健康 (同步版)</div>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <button id="tab-feed" class="tab-btn active-feed" onclick="switchTab('feeding')">🍖 餵食紀錄</button>
            <button id="tab-poop" class="tab-btn" onclick="switchTab('poop')">💩 鏟屎健康</button>
        </div>
        <div class="form-section">
            <form class="log-form" onsubmit="addLog(event)">
                <div class="flex-row">
                    <div style="flex:1"><label class="label-text">自訂日期</label><input type="date" id="custom-date" class="input-text"></div>
                    <div style="width:35%"><label class="label-text">時間</label><input type="time" id="custom-time" class="input-text"></div>
                </div>
                <div class="flex-row" id="form-dynamic-inputs" style="align-items:center;margin-top:4px;"></div>
            </form>
        </div>

        <div class="chart-section">
            <div class="history-title">📊 最近 7 日健康統計</div>
            <div class="chart-container">
                <canvas id="healthChart"></canvas>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">歷史綜合紀錄</div>
            <div class="log-list" id="log-list-area"></div>
        </div>
    </div>

    <script>
        // ⚠️ 請在此處填入你的 Google Apps Script 網址 ⚠️
        const API_URL = https://script.google.com/macros/s/AKfycbyWrSfnsINj_a3rLwSW00DJHsncJu3aVfiuLE7thdahPpC1bHkU0LynIMbMtMEynIWE/exec; 

        let logs = JSON.parse(localStorage.getItem('cat_all_logs')) || [];
        let activeTab = 'feeding';
        let myChart = null;

        function updateStatus(text) { document.getElementById('cloud-status-bar').innerText = text; }
        function getOffsetDate(offset) { const d = new Date(); d.setDate(d.getDate() + offset); return d.toISOString().split('T')[0]; }
        function initDateTime() {
            document.getElementById('custom-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('custom-time').value = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
        }

        async function fetchLogs() {
            if(!API_URL || API_URL.includes("換成你")) return;
            updateStatus("☁️ 正在與雲端同步...");
            try {
                let response = await fetch(API_URL);
                let cloudLogs = await response.json();
                if(cloudLogs && cloudLogs.length > 0) {
                    logs = cloudLogs;
                    localStorage.setItem('cat_all_logs', JSON.stringify(logs));
                    renderLogs();
                    updateChart();
                    updateStatus("🟢 雲端同步完成");
                }
            } catch (e) { 
                updateStatus("🟡 雲端連線受阻，目前切換至本地安全模式");
            }
        }

        function switchTab(e){
            activeTab=e; const t=document.getElementById('tab-feed'), n=document.getElementById('tab-poop');
            if("feeding"===e){t.className="tab-btn active-feed"; n.className="tab-btn"}else{t.className="tab-btn"; n.className="tab-btn active-poop"}
            renderInputs();
        }

        // 🌟 確保這個函數被正確呼叫
        function renderInputs(){
            const e=document.getElementById('form-dynamic-inputs');
            if("feeding"===activeTab){
                e.innerHTML=<select id="food-type" class="select-box" style="width:80px"><option>乾糧</option><option>濕糧</option><option>零食</option><option>飲水</option></select><input type="text" id="food-amount" placeholder="份量 (e.g. 40g)" class="input-text" style="flex:1"><button type="submit" class="btn-submit btn-feed">加</button>;
            } else {
                e.innerHTML=<select id="poop-type" class="select-box" style="flex:1"><option>便便 💩</option><option>尿尿 💧</option></select><select id="poop-status" class="select-box" style="flex:1"><option>正常 🪵</option><option>肚痾/偏軟 🌊</option><option>太硬/便秘 🪨</option></select><button type="submit" class="btn-submit btn-poop">加</button>;
            }
        }

        function renderLogs(){
            const e=document.getElementById('log-list-area');
            if(!logs || 0===logs.length){e.innerHTML=<p class="empty-text">未有任何紀錄，請新增第一條</p>;return}
            e.innerHTML=logs.map(e=><div class="log-item"><div class="log-left"><span class="dot ${"feeding"===e.category?"dot-feed":"dot-poop"}"></span><div><div class="log-title">${e.type}</div><div class="log-time">${String(e.date).substring(0,10)} @ ${e.time}</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="log-detail ${"feeding"===e.category?"text-feed":"text-poop"}">${e.detail}</span><button class="btn-del" onclick="deleteLog('${e.id}')">🗑️</button></div></div>).join("")
        }

        function updateChart() {
            const last7Days = []; for (let i = 6; i >= 0; i--) { last7Days.push(getOffsetDate(-i)); }
            const feedCounts = Array(7).fill(0); const poopCounts = Array(7).fill(0);
            if(logs && logs.length > 0) {
                logs.forEach(log => {
                    let formattedDate = String(log.date).substring(0,10);
                    const dayIndex = last7Days.indexOf(formattedDate);
                    if (dayIndex !== -1) { if (log.category === 'feeding') { feedCounts[dayIndex] += 1; } else { poopCounts[dayIndex] += 1; } }
                });
            }
            const labels = last7Days.map(dateStr => dateStr.substring(5));
            if (myChart) {
                myChart.data.datasets[0].data = feedCounts; myChart.data.datasets[1].data = poopCounts; myChart.update();
            } else {
                const ctx = document.getElementById('healthChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [ { label: '🍖 餵食', data: feedCounts, backgroundColor: '#fb923c', borderRadius: 4 }, { label: '💩 排泄', data: poopCounts, backgroundColor: '#78350f', borderRadius: 4 } ] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }, plugins: { legend: { labels: { boxWidth: 12, font: { size: 11 } } } } }
                });
            }
        }

        async function addLog(e){
            e.preventDefault(); 
            const t=document.getElementById('custom-date').value, n=document.getElementById('custom-time').value;
            let a={action:"add", id:String(Date.now()), date:t, time:n, category:activeTab, type:"", detail:""};
            if("feeding"===activeTab){
                const e=document.getElementById('food-amount').value.trim(); if(!e) return;
                a.type=document.getElementById('food-type').value; a.detail=e;
            }else{a.type=document.getElementById('poop-type').value; a.detail=document.getElementById('poop-status').value}
            
            logs.unshift(a);
            localStorage.setItem('cat_all_logs', JSON.stringify(logs));
            renderLogs();
            updateChart();
            
            if("feeding"===activeTab) document.getElementById('food-amount').value="";
            initDateTime();
            
            if(!API_URL || API_URL.includes("換成你")) return;
            try {
                updateStatus("☁️ 正在同步新紀錄到雲端...");
                await fetch(API_URL, { method: "POST", body: JSON.stringify(a) });
                updateStatus("🟢 雲端同步完成");
            } catch (err) {
                updateStatus("🟡 已儲存至本地 (連線恢復時將自動同步)");
            }
        }

        async function deleteLog(id){
            if(confirm("確定要刪除呢條紀錄？")){
                logs = logs.filter(t => t.id !== id);
                localStorage.setItem('cat_all_logs', JSON.stringify(logs));
                renderLogs();
                updateChart();
                if(!API_URL || API_URL.includes("換成你")) return;
                try {
                    await fetch(API_URL, { method: "POST", body: JSON.stringify({action: "delete", id: id}) });
                } catch (e) { updateStatus("⚠️ 雲端刪除失敗，已先從本地移除"); }
            }
        }

        // 🌟 終極修復：確保網頁一打開，立刻強制把輸入選單同「加」字掣畫出來！
        initDateTime();
        renderInputs(); 
        renderLogs();
        updateChart();
        fetchLogs();
    </script>
</body>
</html>
