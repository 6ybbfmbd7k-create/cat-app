<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐱 Liz 日常全方位記錄 (流暢無阻穩定版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #f9fafb; padding: 15px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 400px; background: white; border-radius: 16px; border: 1px solid #f3f4f6; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .header { background: #fb923c; color: white; text-align: center; padding: 16px; font-weight: bold; font-size: 20px; }
        .profile-card { background: #fff7ed; margin: 12px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffedd5; }
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; background: #fed7aa; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .profile-name { font-size: 16px; font-weight: bold; color: #1f2937; }
        .profile-weight { font-size: 13px; color: #e11d48; font-weight: bold; background: #ffe4e6; padding: 2px 8px; border-radius: 20px; }
        .tabs { display: flex; gap: 6px; padding: 0 12px; margin-bottom: 8px; }
        .tab-btn { flex: 1; padding: 10px 4px; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; background: #e5e7eb; color: #4b5563; text-align: center; }
        .tab-btn.active-feed { background: #fb923c; color: white; }
        .tab-btn.active-poop { background: #78350f; color: white; }
        .tab-btn.active-weight { background: #e11d48; color: white; }
        .form-section { padding: 0 12px 12px 12px; }
        .log-form { background: #f9fafb; padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
        .label-text { font-size: 10px; color: #9ca3af; display: block; margin-bottom: 2px; }
        .flex-row { display: flex; gap: 8px; width: 100%; align-items: center; }
        .input-text { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; }
        .select-box { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; background: white; }
        .btn-submit { padding: 8px 16px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; min-width: 60px; text-align: center; }
        .btn-feed { background: #fb923c; }
        .btn-poop { background: #78350f; }
        .btn-weight { background: #e11d48; }
        .chart-section { padding: 12px; border-top: 1px solid #f3f4f6; background: #fdfdfd; }
        .chart-container { background: white; border: 1px solid #e5e7eb; padding: 10px; border-radius: 12px; position: relative; width: 100%; height: 180px; }
        .history-section { border-top: 1px solid #f3f4f6; padding: 12px; }
        .history-title { font-size: 12px; font-weight: bold; color: #9ca3af; margin-bottom: 8px; }
        .log-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 12px; border-radius: 12px; border: 1px solid #f3f4f6; }
        .log-left { display: flex; align-items: center; gap: 8px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot-feed { background: #fb923c; }
        .dot-poop { background: #78350f; }
        .dot-weight { background: #e11d48; }
        .log-title { font-size: 13px; font-weight: bold; color: #1f2937; }
        .log-time { font-size: 10px; color: #9ca3af; }
        .log-detail { font-size: 13px; font-weight: bold; }
        .text-feed { color: #f97316; }
        .text-poop { color: #78350f; }
        .text-weight { color: #e11d48; }
        .btn-del { color: #d1d5db; border: none; background: none; font-size: 12px; cursor: pointer; padding: 4px; }
        .empty-text { text-align: center; font-size: 13px; color: #9ca3af; padding: 16px 0; }
        .cloud-status { text-align: center; font-size: 11px; color: #16a34a; padding: 4px; background: #f0fdf4; border-radius: 4px; margin-bottom: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="cloud-status-bar" class="cloud-status">🟢 智能全天候安全模式已啟動</div>
        <div class="header">🐱 Liz 日常全方位記錄</div>
        <div class="profile-card">
            <div class="profile-info">
                <div class="avatar">🐱</div>
                <div>
                    <div class="profile-name">Liz</div>
                    <div style="font-size:11px;color:#6b7280;">健康共同守護</div>
                </div>
            </div>
            <div id="latest-weight-display">
                <span class="profile-weight">⚖️ -- kg</span>
            </div>
        </div>
        
        <div class="tabs">
            <button id="tab-feed" class="tab-btn active-feed" onclick="switchTab('feeding')">🍖 餵食紀錄</button>
            <button id="tab-poop" class="tab-btn" onclick="switchTab('poop')">💩 鏟屎健康</button>
            <button id="tab-weight" class="tab-btn" onclick="switchTab('weight')">⚖️ 體重登記</button>
        </div>
        <div class="form-section">
            <form class="log-form" onsubmit="addLog(event)">
                <div class="flex-row">
                    <div style="flex:1"><label class="label-text">自訂日期</label><input type="date" id="custom-date" class="input-text"></div>
                    <div style="width:35%"><label class="label-text">時間</label><input type="time" id="custom-time" class="input-text"></div>
                </div>
                <div class="flex-row" id="form-dynamic-inputs"></div>
            </form>
        </div>

        <div class="chart-section">
            <div class="history-title">📊 最近 7 日健康統計</div>
            <div class="chart-container">
                <canvas id="healthChart"></canvas>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">歷史綜合紀錄</div>
            <div class="log-list" id="log-list-area"></div>
        </div>
    </div>

    <script>
        // ⚠️ 請在此處填入你的 Google Apps Script 網址 ⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbyWrSfnsINj_a3rLwSW00DJHsncJu3aVfiuLE7thdahPpC1bHkU0LynIMbMtMEynIWE/exec"; 

        let logs = JSON.parse(localStorage.getItem('cat_all_logs')) || [];
        let activeTab = 'feeding';
        let myChart = null;

        function updateStatus(text, bg, color) { 
            const bar = document.getElementById('cloud-status-bar');
            bar.innerText = text;
            bar.style.backgroundColor = bg;
            bar.style.color = color;
        }
        
        function getOffsetDate(offset) { const d = new Date(); d.setDate(d.getDate() + offset); return d.toISOString().split('T')[0]; }
        
        function initDateTime() {
            // 【終極修正】強制拆開提取本地時間，阻斷任何手機系統引起的日期格式錯誤
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('custom-date').value = ${year}-${month}-${day};
            document.getElementById('custom-time').value = ${hours}:${minutes};
        }

        // 採用最安全嘅無阻礙背景同步，絕不卡死手機介面
        async function fetchLogs() {
            if(!API_URL || API_URL.includes("換成你") || API_URL === "") return;
            try {
                // 用安全模式讀取雲端（如果 CROS 失敗也會自動跳過，絕不阻礙用戶輸入）
                let response = await fetch(API_URL);
                let cloudLogs = await response.json();
                if(cloudLogs && cloudLogs.length > 0) {
                    logs = cloudLogs;
                    localStorage.setItem('cat_all_logs', JSON.stringify(logs));
                    renderLogs(); updateChart(); updateWeightDisplay();
                }
            } catch (e) {
                // 即使出錯也安靜跳過，確保本地 100% 可用
            }
        }

        function switchTab(tabName) {
            activeTab = tabName;
            document.getElementById('tab-feed').className = "tab-btn";
            document.getElementById('tab-poop').className = "tab-btn";
            document.getElementById('tab-weight').className = "tab-btn";
            
            if (tabName === 'feeding') { document.getElementById('tab-feed').className = "tab-btn active-feed"; } 
            else if (tabName === 'poop') { document.getElementById('tab-poop').className = "tab-btn active-poop"; } 
            else if (tabName === 'weight') { document.getElementById('tab-weight').className = "tab-btn active-weight"; }
            renderInputs();
        }

        function renderInputs() {
            const container = document.getElementById('form-dynamic-inputs');
            if (activeTab === 'feeding') {
                container.innerHTML = '<select id="food-type" class="select-box" style="width:80px"><option>乾糧</option><option>濕糧</option><option>零食</option><option>飲水</option></select><input type="text" id="food-amount" placeholder="份量 (e.g. 40g)" class="input-text" style="flex:1"><button type="submit" class="btn-submit btn-feed">加</button>';
            } else if (activeTab === 'poop') {
                container.innerHTML = '<select id="poop-type" class="select-box" style="flex:1"><option>便便 💩</option><option>尿尿 💧</option></select><select id="poop-status" class="select-box" style="flex:1"><option>正常 🪵</option><option>肚痾/偏軟 🌊</option><option>太硬/便秘 🪨</option></select><button type="submit" class="btn-submit btn-poop">加</button>';
            } else if (activeTab === 'weight') {
                container.innerHTML = '<input type="number" step="0.01" id="cat-weight-input" placeholder="體重 (e.g. 4.5)" class="input-text" style="flex:1"><span style="font-size:14px;font-weight:bold;margin-right:4px;">kg</span><button type="submit" class="btn-submit btn-weight">加</button>';
            }
        }

        function updateWeightDisplay() {
            let weightLog = logs.find(function(l) { return l.category === 'weight'; });
            if (weightLog) { document.getElementById('latest-weight-display').innerHTML = '<span class="profile-weight">⚖️ ' + weightLog.detail + ' kg</span>'; } 
            else { document.getElementById('latest-weight-display').innerHTML = '<span class="profile-weight">⚖️ -- kg</span>'; }
        }

        function renderLogs() {
            const area = document.getElementById('log-list-area');
            if (!logs || logs.length === 0) { area.innerHTML = '<p class="empty-text">未有任何紀錄，請新增第一條</p>'; return; }
            area.innerHTML = logs.map(function(e) {
                let dotClass = "dot-feed"; let textClass = "text-feed";
                if (e.category === 'poop') { dotClass = "dot-poop"; textClass = "text-poop"; }
                if (e.category === 'weight') { dotClass = "dot-weight"; textClass = "text-weight"; }
                let displayType = e.category === 'weight' ? "⚖️ 體重登記" : e.type;
                let displayDetail = e.category === 'weight' ? e.detail + " kg" : e.detail;
                return '<div class="log-item"><div class="log-left"><span class="dot ' + dotClass + '"></span><div><div class="log-title">' + displayType + '</div><div class="log-time">' + String(e.date).substring(0,10) + ' @ ' + e.time + '</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="log-detail ' + textClass + '">' + displayDetail + '</span><button class="btn-del" onclick="deleteLog(\'' + e.id + '\')">🗑️</button></div></div>';
            }).join("");
        }

        function updateChart() {
            const last7Days = []; for (let i = 6; i >= 0; i--) { last7Days.push(getOffsetDate(-i)); }
            const feedCounts = Array(7).fill(0); const poopCounts = Array(7).fill(0);
            logs.forEach(function(log) {
                let formattedDate = String(log.date).substring(0,10);
                const dayIndex = last7Days.indexOf(formattedDate);
                if (dayIndex !== -1) { 
                    if (log.category === 'feeding') feedCounts[dayIndex] += 1; 
                    if (log.category === 'poop') poopCounts[dayIndex] += 1; 
                }
            });
            const labels = last7Days.map(function(dateStr) { return dateStr.substring(5); });
            if (myChart) {
                myChart.data.datasets[0].data = feedCounts; myChart.data.datasets[1].data = poopCounts; myChart.update();
            } else {
                const ctx = document.getElementById('healthChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [ { label: '🍖 餵食', data: feedCounts, backgroundColor: '#fb923c', borderRadius: 4 }, { label: '💩 排泄', data: poopCounts, backgroundColor: '#78350f', borderRadius: 4 } ] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }, plugins: { legend: { labels: { boxWidth: 12, font: { size: 11 } } } } }
                });
            }
        }

        async function addLog(e) {
            e.preventDefault(); 
            const rawDate = document.getElementById('custom-date').value; 
            const n = document.getElementById('custom-time').value;
            let a = {action:"add", id:String(Date.now()), date:rawDate, time:n, category:activeTab, type:"", detail:""};
            
            if (activeTab === "feeding") {
                const amt = document.getElementById('food-amount').value.trim(); if(!amt) return;
                a.type = document.getElementById('food-type').value; a.detail = amt;
            } else if (activeTab === "poop") {
                a.type = document.getElementById('poop-type').value; a.detail = document.getElementById('poop-status').value;
            } else if (activeTab === "weight") {
                const wg = document.getElementById('cat-weight-input').value.trim(); if(!wg) return;
                a.type = "體重"; a.detail = wg;
            }
            
            // 1. 本地即時反應，體驗極致流暢
            logs.unshift(a);
            localStorage.setItem('cat_all_logs', JSON.stringify(logs));
            renderLogs(); updateChart(); updateWeightDisplay();
            initDateTime(); switchTab(activeTab);

            // 2. 採用絕對不會阻礙手機運作的盲投模式發送至雲端
            if(!API_URL || API_URL.includes("換成你") || API_URL === "") return;
            try {
                updateStatus("⚡ 正在同步雲端...", "#fffbeb", "#d97706");
                // 使用 no-cors 確保網頁版與主畫面版有最高的兼容度與速度
                fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(a)
                });
                setTimeout(() => { updateStatus("🟢 資料已安全儲存", "#f0fdf4", "#16a34a"); }, 800);
            } catch (err) {
                setTimeout(() => { updateStatus("🟢 資料已安全儲存", "#f0fdf4", "#16a34a"); }, 800);
            }
        }

        async function deleteLog(id) {
            if (confirm("確定要刪除呢條紀錄？")) {
                logs = logs.filter(function(t) { return t.id !== id; });
                localStorage.setItem('cat_all_logs', JSON.stringify(logs));
                renderLogs(); updateChart(); updateWeightDisplay();
                
                if(!API_URL || API_URL.includes("換成你") || API_URL === "") return;
                try { fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({action: "delete", id: id}) }); } catch (e) {}
            }
        }

        // 強制第一時間載入全套介面與按鈕
        initDateTime(); switchTab("feeding"); renderLogs(); updateChart(); updateWeightDisplay();
        
        // 背景安靜同步
        setTimeout(fetchLogs, 600);
    </script>
</body>
</html>
